name: Elixir CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit_and_static:
    name: Unit, Lint, Dialyzer, and Coverage
    runs-on: ubuntu-22.04

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Elixir
        uses: erlef/setup-beam@9d5b75ddfda22fb979d2270283237aef8aa68d6b
        with:
          elixir-version: "1.16.3"
          otp-version: "26.0"

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Dialyzer PLT
        id: plt-cache
        uses: actions/cache@v3
        with:
          path: _build
          key: ${{ runner.os }}-dialyzer-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-

      - name: Install dependencies
        run: MIX_ENV=test mix deps.get

      - name: Build PLT
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer

      - name: Run Credo Linter
        run: mix credo

      - name: Run tests with coverage
        run: MIX_ENV=test mix coveralls.json

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration Tests (RabbitMQ)
    runs-on: ubuntu-22.04

    services:
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Elixir
        uses: erlef/setup-beam@9d5b75ddfda22fb979d2270283237aef8aa68d6b
        with:
          elixir-version: "1.16.3"
          otp-version: "26.0"

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: MIX_ENV=test mix deps.get

      - name: Run integration tests
        env:
          RUN_INTEGRATION: "true"
          AMQP_TEST_HOST: "127.0.0.1"
          AMQP_TEST_PORT: "5672"
        run: MIX_ENV=test mix test --only integration
